<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studeo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0e0c00;--bg2:#141100;--bg3:#1a1700;--bg4:#211e00;--bg5:#282200;
  --tx:#a89870;--tx2:#6a5e35;--tx3:#2e2810;
  --ac:#8a6810;--ac2:#705408;--acl:#a07828;
  --br:rgba(212,160,23,.1);--br2:rgba(212,160,23,.25);
  --gn:#1a7040;--rd:#a03030;--bl:#3060a0;
  --r:8px;--r2:12px;--r3:16px;
}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;display:flex;flex-direction:column;}

.nav{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;background:var(--bg2);border-bottom:1px solid var(--br);flex-shrink:0;}
.nav-brand{display:flex;align-items:center;gap:10px;}
.nav-name{font-size:14px;font-weight:700;letter-spacing:-.3px;color:var(--tx);}
.nav-tabs{display:flex;gap:1px;background:var(--bg3);border-radius:var(--r);padding:3px;}
.nav-tab{padding:5px 14px;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;color:var(--tx2);border:none;background:transparent;font-family:inherit;transition:all .15s;}
.nav-tab.on{background:var(--bg5);color:var(--tx);}

.main{flex:1;overflow-y:auto;padding:20px 24px;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
.stat{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r2);padding:14px 16px;}
.stat-l{font-size:9px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.stat-v{font-size:22px;font-weight:700;letter-spacing:-.5px;color:var(--acl);}
.stat-v.dim{color:var(--tx2);}
.stat-v.green{color:var(--gn);}
.stat-sub{font-size:10px;color:var(--tx3);margin-top:3px;}

/* MATERIAS */
.mat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.mat-card{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r2);padding:18px;cursor:pointer;transition:all .15s;position:relative;}
.mat-card:hover{border-color:var(--br2);}
.mat-card.aprobada{border-left:3px solid var(--gn);}
.mat-card.cursando{border-left:3px solid var(--acl);}
.mat-card.pendiente{border-left:3px solid var(--tx3);}
.mat-card.libre{border-left:3px solid var(--rd);}
.mat-name{font-size:13.5px;font-weight:600;color:var(--tx);margin-bottom:4px;letter-spacing:-.2px;}
.mat-meta{font-size:11px;color:var(--tx3);margin-bottom:10px;}
.mat-badges{display:flex;gap:6px;flex-wrap:wrap;}
.badge{font-size:9.5px;font-weight:600;padding:2px 8px;border-radius:4px;}
.badge.ap{background:rgba(34,197,94,.12);color:#4ade80;}
.badge.cu{background:rgba(212,160,23,.12);color:var(--acl);}
.badge.pe{background:rgba(255,255,255,.06);color:var(--tx3);}
.badge.li{background:rgba(239,68,68,.1);color:#f87171;}
.mat-nota{font-size:18px;font-weight:700;color:var(--acl);margin-top:8px;}
.mat-del{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--tx3);cursor:pointer;font-size:11px;opacity:0;transition:opacity .15s;}
.mat-card:hover .mat-del{opacity:1;}
.add-mat-btn{background:transparent;border:1px dashed var(--br);border-radius:var(--r2);padding:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px;color:var(--tx3);transition:all .15s;font-family:inherit;width:100%;}
.add-mat-btn:hover{border-color:var(--br2);color:var(--tx2);}

/* EVALUACIONES */
.ev-list{display:flex;flex-direction:column;gap:8px;}
.ev-card{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r2);padding:14px 18px;display:flex;align-items:center;gap:14px;transition:border-color .15s;}
.ev-card:hover{border-color:var(--br2);}
.ev-date-box{background:var(--bg3);border:1px solid var(--br);border-radius:var(--r);padding:8px 12px;text-align:center;flex-shrink:0;min-width:54px;}
.ev-day{font-size:18px;font-weight:700;color:var(--acl);line-height:1;}
.ev-month{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--tx3);margin-top:2px;}
.ev-info{flex:1;}
.ev-name{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:2px;}
.ev-mat{font-size:11px;color:var(--tx3);}
.ev-badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.6px;}
.ev-badge.parcial{background:rgba(212,160,23,.12);color:var(--acl);}
.ev-badge.final{background:rgba(239,68,68,.1);color:#f87171;}
.ev-badge.tp{background:rgba(96,165,250,.1);color:var(--bl);}
.ev-badge.quiz{background:rgba(34,197,94,.1);color:#4ade80;}
.ev-dias{font-size:10px;color:var(--tx3);white-space:nowrap;}
.ev-dias.urgente{color:#f87171;}
.ev-dias.pronto{color:var(--acl);}
.ev-del{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:11px;opacity:0;transition:opacity .15s;padding:4px;}
.ev-card:hover .ev-del{opacity:1;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal{background:var(--bg2);border:1px solid var(--br2);border-radius:var(--r3);padding:24px;width:420px;max-width:90vw;}
.modal-title{font-size:15px;font-weight:600;margin-bottom:18px;letter-spacing:-.2px;}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.fl{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;}
input,select{background:var(--bg3);border:1px solid var(--br);border-radius:var(--r);color:var(--tx);font-family:inherit;font-size:13px;padding:9px 12px;outline:none;width:100%;transition:border-color .15s;}
input:focus,select:focus{border-color:var(--br2);}
select option{background:var(--bg3);}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
.btn{background:var(--ac);border:none;border-radius:var(--r);color:#000;font-family:inherit;font-size:12.5px;font-weight:600;padding:8px 18px;cursor:pointer;transition:opacity .15s;}
.btn:hover{opacity:.88;}
.btn.ghost{background:transparent;border:1px solid var(--br);color:var(--tx2);}

/* PROGRESO */
.prog-bar{height:4px;background:var(--bg4);border-radius:2px;margin-top:10px;overflow:hidden;}
.prog-fill{height:4px;background:var(--acl);border-radius:2px;transition:width .4s;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px;}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">
    <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
      <rect width="26" height="26" rx="7" fill="#1a1400"/>
      <path d="M5 18l8-4 8 4" stroke="#d4a017" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity=".4"/>
      <path d="M5 14l8-4 8 4-8 4-8-4z" stroke="#d4a017" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity=".7"/>
      <path d="M5 10l8-4 8 4-8 4-8-4z" stroke="#f0c040" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="rgba(240,192,64,.1)"/>
    </svg>
    <span class="nav-name">Studeo</span>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab on" onclick="setTab('materias')">Materias</button>
    <button class="nav-tab" onclick="setTab('evaluaciones')">Evaluaciones</button>
  </div>
</nav>

<div class="main" id="main"></div>

<div id="modal-bg" class="modal-bg" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
    <div class="modal-btns">
      <button class="btn ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn" id="modal-save">Guardar</button>
    </div>
  </div>
</div>

<script>
let tab='materias';
let editId=null;

const MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const TIPOS=['Parcial','Final','TP','Quiz'];
const ESTADOS=['Cursando','Aprobada','Pendiente','Libre'];
const ANIOS=['1°','2°','3°','4°','5°'];

let state={
  materias:[
    {id:1,name:'Análisis Matemático I',anio:'1°',estado:'Aprobada',nota:'8',creditos:6},
    {id:2,name:'Álgebra Lineal',anio:'1°',estado:'Aprobada',nota:'7',creditos:6},
    {id:3,name:'Probabilidad y Estadística',anio:'2°',estado:'Aprobada',nota:'9',creditos:6},
    {id:4,name:'Análisis Matemático II',anio:'2°',estado:'Cursando',nota:'',creditos:6},
    {id:5,name:'Bases de Datos',anio:'2°',estado:'Cursando',nota:'',creditos:6},
    {id:6,name:'Algoritmos y Estructuras',anio:'3°',estado:'Pendiente',nota:'',creditos:6},
    {id:7,name:'Machine Learning',anio:'3°',estado:'Pendiente',nota:'',creditos:8},
  ],
  evaluaciones:[
    {id:1,mat:'Análisis Matemático II',nombre:'Segundo Parcial',tipo:'Parcial',fecha:getFutureDate(6)},
    {id:2,mat:'Bases de Datos',nombre:'Trabajo Práctico 2',tipo:'TP',fecha:getFutureDate(12)},
    {id:3,mat:'Análisis Matemático II',nombre:'Quiz Capítulo 5',tipo:'Quiz',fecha:getFutureDate(2)},
    {id:4,mat:'Bases de Datos',nombre:'Examen Final',tipo:'Final',fecha:getFutureDate(28)},
  ],
  nextId:8,
};

function getFutureDate(days){
  const d=new Date();d.setDate(d.getDate()+days);
  return d.toISOString().slice(0,10);
}

const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function setTab(t){
  tab=t;
  document.querySelectorAll('.nav-tab').forEach((el,i)=>el.classList.toggle('on',['materias','evaluaciones'][i]===t));
  render();
}

function estadoBadge(e){
  const map={Aprobada:'ap',Cursando:'cu',Pendiente:'pe',Libre:'li'};
  const labels={Aprobada:'Aprobada',Cursando:'Cursando',Pendiente:'Pendiente',Libre:'Libre'};
  return`<span class="badge ${map[e]||'pe'}">${labels[e]||e}</span>`;
}

function tipoBadge(t){
  const map={Parcial:'parcial',Final:'final',TP:'tp',Quiz:'quiz'};
  return`<span class="ev-badge ${map[t]||'parcial'}">${t}</span>`;
}

function diasLabel(fecha){
  const diff=Math.ceil((new Date(fecha)-new Date())/(1000*60*60*24));
  if(diff<0)return`<span class="ev-dias urgente">Pasó hace ${Math.abs(diff)}d</span>`;
  if(diff===0)return`<span class="ev-dias urgente">Hoy</span>`;
  if(diff<=3)return`<span class="ev-dias urgente">En ${diff}d</span>`;
  if(diff<=7)return`<span class="ev-dias pronto">En ${diff}d</span>`;
  return`<span class="ev-dias">En ${diff}d</span>`;
}

function renderMaterias(){
  const ap=state.materias.filter(m=>m.estado==='Aprobada');
  const cu=state.materias.filter(m=>m.estado==='Cursando');
  const pe=state.materias.filter(m=>m.estado==='Pendiente');
  const prom=ap.length?( ap.reduce((s,m)=>s+parseFloat(m.nota||0),0)/ap.length ).toFixed(1):'—';
  const prog=Math.round(ap.length/state.materias.length*100)||0;

  return`
  <div class="stats">
    <div class="stat"><div class="stat-l">Aprobadas</div><div class="stat-v green">${ap.length}</div><div class="stat-sub">de ${state.materias.length} materias</div></div>
    <div class="stat"><div class="stat-l">Cursando</div><div class="stat-v">${cu.length}</div></div>
    <div class="stat"><div class="stat-l">Pendientes</div><div class="stat-v dim">${pe.length}</div></div>
    <div class="stat"><div class="stat-l">Promedio</div><div class="stat-v">${prom}</div></div>
  </div>
  <div style="background:var(--bg2);border:1px solid var(--br);border-radius:var(--r2);padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px">
    <div style="flex:1">
      <div style="font-size:11px;color:var(--tx3);margin-bottom:6px">Progreso de carrera</div>
      <div class="prog-bar"><div class="prog-fill" style="width:${prog}%"></div></div>
    </div>
    <div style="font-size:18px;font-weight:700;color:var(--acl)">${prog}%</div>
  </div>
  <div class="mat-grid">
    ${state.materias.map(m=>`
      <div class="mat-card ${m.estado.toLowerCase()}" onclick="openMatModal(${m.id})">
        <button class="mat-del" onclick="event.stopPropagation();delMat(${m.id})">✕</button>
        <div class="mat-name">${esc(m.name)}</div>
        <div class="mat-meta">${m.anio} año</div>
        <div class="mat-badges">${estadoBadge(m.estado)}</div>
        ${m.nota?`<div class="mat-nota">${m.nota}</div>`:''}
      </div>`).join('')}
    <button class="add-mat-btn" onclick="openNewMatModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nueva materia
    </button>
  </div>`;
}

function renderEvaluaciones(){
  const sorted=[...state.evaluaciones].sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));
  return`
  <div style="display:flex;justify-content:flex-end;margin-bottom:14px">
    <button class="btn" onclick="openNewEvModal()">+ Nueva evaluación</button>
  </div>
  <div class="ev-list">
    ${sorted.map(e=>{
      const d=new Date(e.fecha);
      return`<div class="ev-card">
        <div class="ev-date-box">
          <div class="ev-day">${d.getDate()}</div>
          <div class="ev-month">${MESES[d.getMonth()]}</div>
        </div>
        <div class="ev-info">
          <div class="ev-name">${esc(e.nombre)}</div>
          <div class="ev-mat">${esc(e.mat)}</div>
        </div>
        ${tipoBadge(e.tipo)}
        ${diasLabel(e.fecha)}
        <button class="ev-del" onclick="delEv(${e.id})">✕</button>
      </div>`;
    }).join('')}
    ${!sorted.length?'<div style="text-align:center;padding:40px;color:var(--tx3);font-size:12.5px">Sin evaluaciones próximas</div>':''}
  </div>`;
}

function render(){
  document.getElementById('main').innerHTML=(tab==='materias'?renderMaterias():renderEvaluaciones());
}

function openMatModal(id){
  const m=state.materias.find(m=>m.id===id)||{};
  editId=id||null;
  document.getElementById('modal-title').textContent=id?'Editar materia':'Nueva materia';
  document.getElementById('modal-body').innerHTML=`
    <div class="fg"><label class="fl">Nombre</label><input id="m-name" value="${esc(m.name||'')}"></div>
    <div class="fr">
      <div class="fg"><label class="fl">Año</label><select id="m-anio">${ANIOS.map(a=>`<option${m.anio===a?' selected':''}>${a}</option>`).join('')}</select></div>
      <div class="fg"><label class="fl">Estado</label><select id="m-estado">${ESTADOS.map(e=>`<option${m.estado===e?' selected':''}>${e}</option>`).join('')}</select></div>
    </div>
    <div class="fg"><label class="fl">Nota final (opcional)</label><input id="m-nota" value="${esc(m.nota||'')}" placeholder="ej. 8, 7.5"></div>`;
  document.getElementById('modal-save').onclick=saveMat;
  document.getElementById('modal-bg').style.display='flex';
}

function openNewMatModal(){editId=null;openMatModal(null);}

function saveMat(){
  const name=document.getElementById('m-name')?.value.trim();
  if(!name)return;
  const obj={name,anio:document.getElementById('m-anio')?.value,estado:document.getElementById('m-estado')?.value,nota:document.getElementById('m-nota')?.value.trim(),creditos:6};
  if(editId){
    const idx=state.materias.findIndex(m=>m.id===editId);
    if(idx>=0)state.materias[idx]={...state.materias[idx],...obj};
  } else {
    state.materias.push({id:state.nextId++,...obj});
  }
  closeModal();render();
}

function delMat(id){state.materias=state.materias.filter(m=>m.id!==id);render();}

function openNewEvModal(){
  editId=null;
  document.getElementById('modal-title').textContent='Nueva evaluación';
  document.getElementById('modal-body').innerHTML=`
    <div class="fg"><label class="fl">Nombre</label><input id="e-nombre" placeholder="ej. Segundo Parcial"></div>
    <div class="fg"><label class="fl">Materia</label><select id="e-mat">${state.materias.map(m=>`<option>${esc(m.name)}</option>`).join('')}</select></div>
    <div class="fr">
      <div class="fg"><label class="fl">Tipo</label><select id="e-tipo">${TIPOS.map(t=>`<option>${t}</option>`).join('')}</select></div>
      <div class="fg"><label class="fl">Fecha</label><input type="date" id="e-fecha"></div>
    </div>`;
  document.getElementById('modal-save').onclick=saveEv;
  document.getElementById('modal-bg').style.display='flex';
}

function saveEv(){
  const nombre=document.getElementById('e-nombre')?.value.trim();
  const fecha=document.getElementById('e-fecha')?.value;
  if(!nombre||!fecha)return;
  state.evaluaciones.push({id:state.nextId++,nombre,mat:document.getElementById('e-mat')?.value,tipo:document.getElementById('e-tipo')?.value,fecha});
  closeModal();render();
}

function delEv(id){state.evaluaciones=state.evaluaciones.filter(e=>e.id!==id);render();}

function closeModal(){document.getElementById('modal-bg').style.display='none';editId=null;}

render();
</script>
</body>
</html>
